<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pages · shakeebshaan</title>
  <style>
    :root {
      --bg: #fafafa; --card: #fff; --fg: #18181b; --muted: #71717a;
      --border: #e4e4e7; --accent: #4f46e5; --shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0b0f; --card: #17171c; --fg: #f4f4f5; --muted: #a1a1aa;
        --border: #27272a; --accent: #818cf8; --shadow: 0 1px 3px rgba(0,0,0,.4);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: var(--fg);
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 860px; margin: 0 auto; padding: 64px 24px 96px; }
    header { margin-bottom: 48px; }
    h1 { margin: 0 0 8px; font-size: 2rem; letter-spacing: -.02em; }
    .sub { color: var(--muted); margin: 0; }
    .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
    a.card {
      display: block; text-decoration: none; color: inherit;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; box-shadow: var(--shadow);
      transition: transform .12s ease, border-color .12s ease;
    }
    a.card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .card h2 { margin: 0 0 6px; font-size: 1.05rem; }
    .card p { margin: 0; color: var(--muted); font-size: .9rem; }
    .card .go { margin-top: 12px; color: var(--accent); font-size: .85rem; font-weight: 600; }
    .empty {
      border: 1px dashed var(--border); border-radius: 12px;
      padding: 32px; text-align: center; color: var(--muted);
    }
    footer { margin-top: 64px; color: var(--muted); font-size: .85rem; }
    footer a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Pages</h1>
      <p class="sub">Public-facing pages hosted from my repos.</p>
    </header>
    <main class="grid" id="grid"></main>
    <footer>
      Source: <a href="https://github.com/shakeebshaan/github-pages">shakeebshaan/github-pages</a>
    </footer>
  </div>

  <script>
    // Add a page: push { name, path, desc } — path is the folder under this site.
    const PAGES = [
      // { name: "My Project", path: "my-project/", desc: "Short description." },
      { name: "COT Nowcast", path: "cot-estimate/",
        desc: "Friday's COT report estimated on Wednesday — 868 walk-forward weeks, estimate vs official." },
      { name: "COT Composite Backtest", path: "cot-backtest/",
        desc: "2022–2026 CFTC COT signal, report-by-report — trades, PnL, TP/SL bracket lab." },
    ];

    const grid = document.getElementById("grid");
    if (!PAGES.length) {
      grid.outerHTML = '<div class="empty">No pages yet. Add entries to the ' +
        '<code>PAGES</code> array in <code>index.html</code>.</div>';
    } else {
      grid.innerHTML = PAGES.map(p =>
        `<a class="card" href="${p.path}">
           <h2>${p.name}</h2>
           <p>${p.desc || ""}</p>
           <div class="go">Open &rarr;</div>
         </a>`
      ).join("");
    }
  </script>
</body>
</html>
